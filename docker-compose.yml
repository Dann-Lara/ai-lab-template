version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ailab_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ailab}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ailab_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: ailab_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${DB_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-secret}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-admin123}
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Mexico_City
      - N8N_LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    container_name: ailab_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-secret}@postgres:5432/${DB_NAME:-ailab}
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-development}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-webhook-secret}
      - N8N_BASE_URL=http://n8n:5678
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./packages:/app/packages

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: development
    container_name: ailab_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:3001
      - NEXT_PUBLIC_APP_NAME=AI Lab
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    depends_on:
      - backend
    volumes:
      - ./apps/frontend/app:/app/apps/frontend/app
      - ./apps/frontend/components:/app/apps/frontend/components
      - ./apps/frontend/hooks:/app/apps/frontend/hooks
      - ./apps/frontend/lib:/app/apps/frontend/lib

volumes:
  postgres_data:
  redis_data:
  n8n_data:
